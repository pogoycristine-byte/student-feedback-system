version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    container_name: student-backend

  frontend:
    build: ./admin-dashboard
    ports:
      - "5173:5173"
    depends_on:
      - backend
    container_name: student-frontend